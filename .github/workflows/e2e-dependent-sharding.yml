name: Parallel Dependents

on:
  workflow_dispatch:
    inputs:
      testing_formulae:
        description: Formulae to test dependents for
        required: false
        default: tree-sitter
      brew_ref:
        description: Brew branch/tag/sha to test
        required: false
        default: feat/add-parallel-dependent-testing
      dry_run:
        description: Use --dry-run for brew test-bot
        required: false
        default: "false"
      skip_recursive_dependents:
        description: Limit the run to direct dependents
        required: false
        default: "true"
      max_linux_x86_64_runners:
        description: Maximum Linux x86_64 runners to allocate for dependent sharding
        required: false
        default: "4"
      dependent_test_base_spillover_threshold:
        description: Minimum dependents before Homebrew spills onto another runner
        required: false
        default: "1"
      dependent_test_additional_runner_reluctance:
        description: Quadratic reluctance factor for adding more Linux shards
        required: false
        default: "0"

env:
  HOMEBREW_DEVELOPER: 1
  HOMEBREW_GITHUB_ACTIONS: 1
  HOMEBREW_NO_AUTO_UPDATE: 1
  HOMEBREW_NO_INSTALL_FROM_API: 1
  HOMEBREW_TEST_BOT_ANALYTICS: 0
  HOMEBREW_ENFORCE_SBOM: 1
  HOMEBREW_NO_BUILD_ERROR_ISSUES: 1
  HOMEBREW_LINUX_RUNNER: ubuntu-latest
  HOMEBREW_DEPENDENT_TEST_BASE_SPILLOVER_THRESHOLD: ${{ inputs.dependent_test_base_spillover_threshold }}
  HOMEBREW_DEPENDENT_TEST_ADDITIONAL_RUNNER_RELUCTANCE: ${{ inputs.dependent_test_additional_runner_reluctance }}
  HOMEBREW_DEPENDENT_TEST_MAX_AVAILABLE_LINUX_X86_64_RUNNERS: ${{ inputs.max_linux_x86_64_runners }}
  GH_REPO: ${{ github.repository }}
  GH_NO_UPDATE_NOTIFIER: 1
  GH_PROMPT_DISABLED: 1

jobs:
  determine-runners:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/homebrew/ubuntu22.04:main
      options: --user=linuxbrew
    timeout-minutes: 60
    defaults:
      run:
        shell: /bin/bash -xeuo pipefail {0}
    outputs:
      runners: ${{ steps.determine.outputs.runners }}
      runners_present: ${{ steps.determine.outputs.runners_present }}
      runner_count: ${{ steps.determine.outputs.runner_count }}
    env:
      BREW_DIR: /home/linuxbrew/.linuxbrew/Homebrew
      TEST_BRANCH: ${{ inputs.brew_ref }}
      TESTING_FORMULAE: ${{ inputs.testing_formulae }}
    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main
        id: set-up-homebrew
        with:
          core: true
          cask: false
        env:
          GITHUB_REPOSITORY: GunniBusch/brew

      - uses: Homebrew/actions/cache-homebrew-prefix@main
        with:
          install: gnu-tar
          workflow-key: determine-runners
          uninstall: true

      - name: Switch Homebrew/brew to test branch
        run: |
          cd "$BREW_DIR"
          git remote remove userfork || true
          git remote add userfork https://github.com/GunniBusch/brew.git
          git fetch --force --tags userfork "$TEST_BRANCH"
          git checkout --force -B "$TEST_BRANCH" FETCH_HEAD

      - name: Determine Linux dependent runners
        id: determine
        run: |
          mkdir -p /tmp/parallel-dependents-matrix
          runner_output="$(mktemp)"
          GITHUB_OUTPUT="$runner_output" brew determine-test-runners --eval-all --dependents "$TESTING_FORMULAE"

          raw_runners="$(sed -n 's/^runners=//p' "$runner_output")"
          linux_runners="$(
            ruby -rjson -e '
              runners = JSON.parse(ARGF.read)
              linux_runners = runners.select do |runner|
                runner.fetch("name").start_with?("Linux x86_64")
              end
              linux_runners.each do |runner|
                runner["runner"] = "ubuntu-latest"
                runner["timeout"] = [runner.fetch("timeout"), 360].min
              end
              print JSON.generate(linux_runners)
            ' <<<"$raw_runners"
          )"
          runner_count="$(
            ruby -rjson -e 'print JSON.parse(ARGF.read).length' <<<"$linux_runners"
          )"

          printf '%s\n' "$linux_runners" > /tmp/parallel-dependents-matrix/runners.json
          ruby -rjson -e 'puts JSON.pretty_generate(JSON.parse(ARGF.read))' <<<"$linux_runners"

          {
            echo "runners=$linux_runners"
            echo "runners_present=$([[ "$runner_count" -gt 0 ]] && echo true || echo false)"
            echo "runner_count=$runner_count"
          } >>"$GITHUB_OUTPUT"

      - name: Show shard matrix
        run: |
          echo "### Linux shard matrix" >> "$GITHUB_STEP_SUMMARY"
          echo >> "$GITHUB_STEP_SUMMARY"
          echo "- Formulae: \`$TESTING_FORMULAE\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Shards: \`${{ steps.determine.outputs.runner_count }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo >> "$GITHUB_STEP_SUMMARY"
          ruby -rjson -e '
            runners = JSON.parse(File.read("/tmp/parallel-dependents-matrix/runners.json"))
            runners.each do |runner|
              index = runner.fetch("dependent_shard_index") + 1
              total = runner.fetch("dependent_shard_total")
              puts "- #{runner.fetch("name")} (`#{runner.fetch("runner")}`, shard #{index}/#{total})"
            end
          ' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload shard matrix
        uses: actions/upload-artifact@v4
        with:
          name: parallel-dependents-${{ inputs.testing_formulae }}-matrix
          if-no-files-found: error
          path: /tmp/parallel-dependents-matrix/runners.json

  test-bot:
    name: dependent test-bot (${{ matrix.name }})
    needs: determine-runners
    if: needs.determine-runners.outputs.runners_present == 'true'
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container }}
    timeout-minutes: ${{ matrix.timeout }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.determine-runners.outputs.runners) }}
    defaults:
      run:
        shell: /bin/bash -xeuo pipefail {0}
    env:
      BREW_DIR: /home/linuxbrew/.linuxbrew/Homebrew
      WORK_DIR: /tmp/parallel-dependents-${{ matrix.dependent_shard_index }}
      BOTTLES_DIR: /tmp/parallel-dependents-${{ matrix.dependent_shard_index }}/bottles
      ARTIFACTS_DIR: /tmp/parallel-dependents-${{ matrix.dependent_shard_index }}/artifacts
      TEST_BRANCH: ${{ inputs.brew_ref }}
      TESTING_FORMULAE: ${{ inputs.testing_formulae }}
      DRY_RUN: ${{ inputs.dry_run }}
      SKIP_RECURSIVE_DEPENDENTS: ${{ inputs.skip_recursive_dependents }}
      HOMEBREW_DEPENDENT_SHARD_INDEX: ${{ matrix.dependent_shard_index }}
      HOMEBREW_DEPENDENT_SHARD_TOTAL: ${{ matrix.dependent_shard_total }}
    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main
        id: set-up-homebrew
        with:
          core: true
          cask: false
        env:
          GITHUB_REPOSITORY: GunniBusch/brew

      - uses: Homebrew/actions/cache-homebrew-prefix@main
        with:
          install: gnu-tar
          workflow-key: test-bot-${{ matrix.dependent_shard_index }}
          uninstall: true

      - name: Switch Homebrew/brew to test branch
        run: |
          cd "$BREW_DIR"
          git remote remove userfork || true
          git remote add userfork https://github.com/GunniBusch/brew.git
          git fetch --force --tags userfork "$TEST_BRANCH"
          git checkout --force -B "$TEST_BRANCH" FETCH_HEAD

      - name: Show shard configuration
        run: |
          echo "Runner: ${{ matrix.runner }}"
          echo "Shard: ${HOMEBREW_DEPENDENT_SHARD_INDEX}/${HOMEBREW_DEPENDENT_SHARD_TOTAL}"
          echo "Formulae: $TESTING_FORMULAE"

      - name: Show dependent plan
        run: |
          mkdir -p "$WORK_DIR"
          cd "$WORK_DIR"
          args=(--formula --include-test --eval-all)
          if [[ "$SKIP_RECURSIVE_DEPENDENTS" != "true" ]]; then
            args+=(--recursive)
          fi
          brew uses "${args[@]}" "$TESTING_FORMULAE" | tee dependent-plan.txt

      - name: Download testing bottles for dependent run
        if: inputs.dry_run != 'true'
        run: |
          mkdir -p "$BOTTLES_DIR"
          bottle_tag="$(brew ruby -e 'puts Utils::Bottles.tag')"
          IFS=',' read -r -a formulae <<<"$TESTING_FORMULAE"
          for formula in "${formulae[@]}"; do
            brew fetch --force-bottle --formula "$formula"
            bottle_path="$(brew --cache --bottle-tag="$bottle_tag" "$formula")"
            bottle_filename="$(basename "$bottle_path" | sed -E 's/^[0-9a-f]{64}--//')"
            cp -fv "$bottle_path" "$BOTTLES_DIR/$bottle_filename"
          done

      - name: Run dependent test-bot pass
        run: |
          mkdir -p "$BOTTLES_DIR"
          cd "$BOTTLES_DIR"
          args=(
            test-bot
            --only-formulae-dependents
            --junit
            --testing-formulae="$TESTING_FORMULAE"
            --tested-formulae="$TESTING_FORMULAE"
          )
          if [[ "$DRY_RUN" == "true" ]]; then
            args+=(--dry-run)
          fi
          if [[ "$SKIP_RECURSIVE_DEPENDENTS" == "true" ]]; then
            args+=(--skip-recursive-dependents)
          fi
          start_epoch="$(date +%s)"
          brew "${args[@]}" 2>&1 | tee test-bot.log
          end_epoch="$(date +%s)"
          echo "$((end_epoch - start_epoch))" > duration-seconds.txt

      - name: Collect dependent artifacts
        if: always()
        run: |
          mkdir -p "$ARTIFACTS_DIR"
          cp -f "$WORK_DIR"/dependent-plan.txt "$ARTIFACTS_DIR"/dependent-plan.txt || true
          cp -f "$BOTTLES_DIR"/test-bot.log "$ARTIFACTS_DIR"/test-bot.log || true
          cp -f "$BOTTLES_DIR"/duration-seconds.txt "$ARTIFACTS_DIR"/duration-seconds.txt || true
          cp -f "$BOTTLES_DIR"/tested-dependents-*.txt "$ARTIFACTS_DIR"/ 2>/dev/null || true
          cp -f "$BOTTLES_DIR"/*.xml "$ARTIFACTS_DIR"/ 2>/dev/null || true

      - name: Upload dependent artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: parallel-dependents-${{ inputs.testing_formulae }}-shard-${{ matrix.dependent_shard_index }}-of-${{ matrix.dependent_shard_total }}
          if-no-files-found: warn
          path: ${{ env.ARTIFACTS_DIR }}/
