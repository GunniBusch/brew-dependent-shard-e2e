name: Parallel Dependents

on:
  workflow_dispatch:
    inputs:
      testing_formulae:
        description: Formulae to test dependents for
        required: false
        default: tree-sitter
      brew_ref:
        description: Brew branch/tag/sha to test
        required: false
        default: feat/add-parallel-dependent-testing
      dry_run:
        description: Use --dry-run for brew test-bot
        required: false
        default: "false"
      skip_recursive_dependents:
        description: Limit the run to direct dependents
        required: false
        default: "true"
      max_linux_x86_64_runners:
        description: Maximum Linux x86_64 runners to allocate for dependent sharding
        required: false
        default: "4"
      dependent_test_base_spillover_threshold:
        description: Minimum dependents before Homebrew spills onto another runner
        required: false
        default: "1"
      dependent_test_additional_runner_reluctance:
        description: Quadratic reluctance factor for adding more Linux shards
        required: false
        default: "0"

env:
  HOMEBREW_DEVELOPER: 1
  HOMEBREW_GITHUB_ACTIONS: 1
  HOMEBREW_NO_AUTO_UPDATE: 1
  HOMEBREW_NO_INSTALL_FROM_API: 1
  HOMEBREW_TEST_BOT_ANALYTICS: 0
  HOMEBREW_ENFORCE_SBOM: 1
  HOMEBREW_NO_BUILD_ERROR_ISSUES: 1
  HOMEBREW_DEPS_SHARDING: 1
  HOMEBREW_LINUX_RUNNER: ubuntu-latest
  HOMEBREW_DEPS_SHARD_MAX_RUNNERS_LINUX_X86_64: ${{ inputs.max_linux_x86_64_runners }}
  HOMEBREW_DEPS_SHARD_BASE_THRESHOLD_LINUX_X86_64: ${{ inputs.dependent_test_base_spillover_threshold }}
  HOMEBREW_DEPS_SHARD_RUNNER_PENALTY_LINUX_X86_64: ${{ inputs.dependent_test_additional_runner_reluctance }}
  GH_REPO: ${{ github.repository }}
  GH_NO_UPDATE_NOTIFIER: 1
  GH_PROMPT_DISABLED: 1

jobs:
  determine-runners:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/homebrew/ubuntu22.04:main
      options: --user=linuxbrew
    timeout-minutes: 60
    defaults:
      run:
        shell: /bin/bash -xeuo pipefail {0}
    outputs:
      runners: ${{ steps.determine.outputs.runners }}
      runners_present: ${{ steps.determine.outputs.runners_present }}
      runner_count: ${{ steps.determine.outputs.runner_count }}
    env:
      BREW_DIR: /home/linuxbrew/.linuxbrew/Homebrew
      TEST_BRANCH: ${{ inputs.brew_ref }}
      TESTING_FORMULAE: ${{ inputs.testing_formulae }}
    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main
        id: set-up-homebrew
        with:
          core: true
          cask: false
        env:
          GITHUB_REPOSITORY: GunniBusch/brew

      - name: Switch Homebrew/brew to test branch
        run: |
          cd "$BREW_DIR"
          git remote remove userfork || true
          git remote add userfork https://github.com/GunniBusch/brew.git
          git fetch --force --tags userfork "$TEST_BRANCH"
          git checkout --force -B "$TEST_BRANCH" FETCH_HEAD

      - name: Determine Linux dependent runners
        id: determine
        run: |
          mkdir -p /tmp/parallel-dependents-matrix
          runner_output="$(mktemp)"
          GITHUB_OUTPUT="$runner_output" brew determine-test-runners --eval-all --dependents "$TESTING_FORMULAE"

          raw_runners="$(sed -n 's/^runners=//p' "$runner_output")"
          linux_runners="$(
            brew ruby -rjson -e '
              runners = JSON.parse(ARGF.read)
              linux_runners = runners.select do |runner|
                runner.fetch("name").start_with?("Linux x86_64")
              end
              linux_runners.each do |runner|
                runner["runner"] = "ubuntu-latest"
                runner["timeout"] = [runner.fetch("timeout"), 360].min
              end
              print JSON.generate(linux_runners)
            ' <<<"$raw_runners"
          )"
          runner_count="$(
            brew ruby -rjson -e 'print JSON.parse(ARGF.read).length' <<<"$linux_runners"
          )"

          printf '%s\n' "$linux_runners" > /tmp/parallel-dependents-matrix/runners.json
          brew ruby -rjson -e 'puts JSON.pretty_generate(JSON.parse(ARGF.read))' <<<"$linux_runners"

          {
            echo "runners=$linux_runners"
            echo "runners_present=$([[ "$runner_count" -gt 0 ]] && echo true || echo false)"
            echo "runner_count=$runner_count"
          } >>"$GITHUB_OUTPUT"

      - name: Show shard matrix
        run: |
          echo "### Linux shard matrix" >> "$GITHUB_STEP_SUMMARY"
          echo >> "$GITHUB_STEP_SUMMARY"
          echo "- Formulae: \`$TESTING_FORMULAE\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Shards: \`${{ steps.determine.outputs.runner_count }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo >> "$GITHUB_STEP_SUMMARY"
          brew ruby -rjson -e '
            runners = JSON.parse(File.read("/tmp/parallel-dependents-matrix/runners.json"))
            runners.each do |runner|
              index = runner.fetch("shard_index") + 1
              total = runner.fetch("shard_total")
              puts "- #{runner.fetch("name")} (`#{runner.fetch("runner")}`, shard #{index}/#{total})"
            end
          ' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload shard matrix
        uses: actions/upload-artifact@v4
        with:
          name: parallel-dependents-${{ inputs.testing_formulae }}-matrix
          if-no-files-found: error
          path: /tmp/parallel-dependents-matrix/runners.json

  test-bot:
    name: ${{ matrix.name }} (deps)
    needs: determine-runners
    if: needs.determine-runners.outputs.runners_present == 'true'
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container }}
    timeout-minutes: ${{ matrix.timeout }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.determine-runners.outputs.runners) }}
    defaults:
      run:
        shell: /bin/bash -xeuo pipefail {0}
        working-directory: ${{ matrix.workdir || github.workspace }}
    env:
      BREW_DIR: /home/linuxbrew/.linuxbrew/Homebrew
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BOTTLES_DIR: ${{ format('{0}/bottles', matrix.workdir || github.workspace) }}
      TEST_BRANCH: ${{ inputs.brew_ref }}
      TESTING_FORMULAE: ${{ matrix.testing_formulae }}
      TESTED_FORMULAE: ${{ inputs.testing_formulae }}
      DRY_RUN: ${{ inputs.dry_run }}
      SKIP_RECURSIVE_DEPENDENTS: ${{ inputs.skip_recursive_dependents }}
      HOMEBREW_DEPS_SHARD_INDEX: ${{ matrix.shard_index }}
      HOMEBREW_DEPS_SHARD_TOTAL: ${{ matrix.shard_total }}
    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main
        id: set-up-homebrew
        with:
          core: true
          cask: false
        env:
          GITHUB_REPOSITORY: GunniBusch/brew

      - name: Switch Homebrew/brew to test branch
        run: |
          cd "$BREW_DIR"
          git remote remove userfork || true
          git remote add userfork https://github.com/GunniBusch/brew.git
          git fetch --force --tags userfork "$TEST_BRANCH"
          git checkout --force -B "$TEST_BRANCH" FETCH_HEAD

      - name: Pre-test steps
        uses: Homebrew/actions/pre-build@main
        with:
          bottles-directory: ${{ env.BOTTLES_DIR }}
          cleanup: ${{ matrix.cleanup }}
          download-bottles: false

      - name: Build dependent test-bot args
        id: dependent-args
        run: |
          args=(--only-formulae-dependents --junit)
          if [[ "$DRY_RUN" == "true" ]]; then
            args+=(--dry-run)
          fi
          if [[ "$SKIP_RECURSIVE_DEPENDENTS" == "true" ]]; then
            args+=(--skip-recursive-dependents)
          fi
          printf 'test_bot_dependents_args=%s\n' "${args[*]}" >>"$GITHUB_OUTPUT"

      - name: Test dependents
        run: |
          xargs -t brew test-bot \
            --testing-formulae="$TESTING_FORMULAE" \
            --tested-formulae="$TESTED_FORMULAE" \
            <<<"${{ steps.dependent-args.outputs.test_bot_dependents_args }}"
        working-directory: ${{ env.BOTTLES_DIR }}

      - name: Post-build steps
        if: always()
        uses: Homebrew/actions/post-build@main
        with:
          runner: ${{ format('{0}-deps', matrix.runner) }}
          cleanup: ${{ matrix.cleanup }}
          bottles-directory: ${{ env.BOTTLES_DIR }}
          logs-directory: ${{ format('{0}/logs', env.BOTTLES_DIR) }}
          upload-bottles: false
