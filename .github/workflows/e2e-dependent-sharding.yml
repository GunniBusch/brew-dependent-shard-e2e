name: Parallel Dependents

on:
  workflow_dispatch:
    inputs:
      testing_formulae:
        description: Formulae to test dependents for
        required: false
        default: tree-sitter
      brew_ref:
        description: Brew branch/tag/sha to test
        required: false
        default: feat/add-parallel-dependent-testing
      dry_run:
        description: Use --dry-run for brew test-bot
        required: false
        default: "false"
      skip_recursive_dependents:
        description: Limit the run to direct dependents
        required: false
        default: "true"

env:
  HOMEBREW_DEVELOPER: 1
  HOMEBREW_GITHUB_ACTIONS: 1
  HOMEBREW_NO_AUTO_UPDATE: 1
  HOMEBREW_NO_INSTALL_FROM_API: 1
  HOMEBREW_TEST_BOT_ANALYTICS: 0
  HOMEBREW_ENFORCE_SBOM: 1
  HOMEBREW_NO_BUILD_ERROR_ISSUES: 1
  GH_REPO: ${{ github.repository }}
  GH_NO_UPDATE_NOTIFIER: 1
  GH_PROMPT_DISABLED: 1

jobs:
  test-bot:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/homebrew/ubuntu22.04:main
      options: --user=linuxbrew
    timeout-minutes: 360
    defaults:
      run:
        shell: /bin/bash -xeuo pipefail {0}
    env:
      BREW_DIR: /home/linuxbrew/.linuxbrew/Homebrew
      WORK_DIR: /tmp/parallel-dependents
      BOTTLES_DIR: /tmp/parallel-dependents/bottles
      ARTIFACTS_DIR: /tmp/parallel-dependents/artifacts
      TEST_BRANCH: ${{ inputs.brew_ref }}
      TESTING_FORMULAE: ${{ inputs.testing_formulae }}
      DRY_RUN: ${{ inputs.dry_run }}
      SKIP_RECURSIVE_DEPENDENTS: ${{ inputs.skip_recursive_dependents }}
    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main
        with:
          core: true
          cask: false
        env:
          GITHUB_REPOSITORY: GunniBusch/brew

      - uses: Homebrew/actions/cache-homebrew-prefix@main
        with:
          install: gnu-tar
          workflow-key: test-bot
          uninstall: true

      - name: Switch Homebrew/brew to test branch
        run: |
          cd "$BREW_DIR"
          git remote remove userfork || true
          git remote add userfork https://github.com/GunniBusch/brew.git
          git fetch --force --tags userfork "$TEST_BRANCH"
          git checkout --force -B "$TEST_BRANCH" FETCH_HEAD

      - run: brew test-bot --only-cleanup-before

      - run: brew test-bot --only-setup

      - run: brew test-bot --only-formulae --only-json-tab --test-default-formula

      - name: Show dependent plan
        run: |
          mkdir -p "$WORK_DIR"
          cd "$WORK_DIR"
          args=(--formula --include-test --eval-all)
          if [[ "$SKIP_RECURSIVE_DEPENDENTS" != "true" ]]; then
            args+=(--recursive)
          fi
          brew uses "${args[@]}" "$TESTING_FORMULAE" | tee dependent-plan.txt

      - name: Download testing bottles for dependent run
        if: inputs.dry_run != 'true'
        run: |
          mkdir -p "$BOTTLES_DIR"
          bottle_tag="$(brew ruby -e 'puts Utils::Bottles.tag')"
          IFS=',' read -r -a formulae <<<"$TESTING_FORMULAE"
          for formula in "${formulae[@]}"; do
            brew fetch --force-bottle --formula "$formula"
            bottle_path="$(brew --cache --bottle-tag="$bottle_tag" "$formula")"
            bottle_filename="$(basename "$bottle_path" | sed -E 's/^[0-9a-f]{64}--//')"
            cp -fv "$bottle_path" "$BOTTLES_DIR/$bottle_filename"
          done

      - name: Run dependent test-bot pass
        run: |
          mkdir -p "$BOTTLES_DIR"
          cd "$BOTTLES_DIR"
          args=(
            test-bot
            --only-formulae-dependents
            --junit
            --testing-formulae="$TESTING_FORMULAE"
            --tested-formulae="$TESTING_FORMULAE"
          )
          if [[ "$DRY_RUN" == "true" ]]; then
            args+=(--dry-run)
          fi
          if [[ "$SKIP_RECURSIVE_DEPENDENTS" == "true" ]]; then
            args+=(--skip-recursive-dependents)
          fi
          start_epoch="$(date +%s)"
          brew "${args[@]}" 2>&1 | tee test-bot.log
          end_epoch="$(date +%s)"
          echo "$((end_epoch - start_epoch))" > duration-seconds.txt

      - name: Collect dependent artifacts
        if: always()
        run: |
          mkdir -p "$ARTIFACTS_DIR"
          cp -f "$WORK_DIR"/dependent-plan.txt "$ARTIFACTS_DIR"/dependent-plan.txt || true
          cp -f "$BOTTLES_DIR"/test-bot.log "$ARTIFACTS_DIR"/test-bot.log || true
          cp -f "$BOTTLES_DIR"/duration-seconds.txt "$ARTIFACTS_DIR"/duration-seconds.txt || true
          cp -f "$BOTTLES_DIR"/tested-dependents-*.txt "$ARTIFACTS_DIR"/ 2>/dev/null || true
          cp -f "$BOTTLES_DIR"/*.xml "$ARTIFACTS_DIR"/ 2>/dev/null || true

      - name: Upload dependent artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: parallel-dependents-${{ inputs.testing_formulae }}
          if-no-files-found: warn
          path: ${{ env.ARTIFACTS_DIR }}/
